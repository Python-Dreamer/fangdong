<div id="app"><div class="auth-page"><div class="auth-card"><div class="logo">🏠</div><h1>房东管家</h1><p class="sub">多房东租房管理系统，支持协作共享</p><div class="fg"><label>邮箱</label><input class="fc" id="authEmail" type="email" placeholder="your@email.com" autocomplete="email"></div><div class="fg"><label>密码</label><input class="fc" id="authPass" type="password" placeholder="至少6位" autocomplete="current-password"></div><div class="fg"><label>姓名（注册时填写）</label><input class="fc" id="authName" placeholder="你的名字" autocomplete="name"></div><button class="btn btn-p btn-block btn-lg" onclick="doSignIn()">登录</button><div style="display:flex;gap:10px;margin-top:12px"><button class="btn btn-o btn-block" onclick="doSignUp()">注册新账号</button></div><div style="display:flex;justify-content:center;margin-top:10px"><button class="btn btn-gh" onclick="doResetPass()">忘记密码</button></div><div style="text-align:center;margin-top:14px"><a href="javascript:void(0)" onclick="reConfig()" style="color:var(--ts);font-size:12px;text-decoration:underline">重新配置Supabase连接</a></div></div></div></div>

<div class="sb-overlay" id="sbOverlay" onclick="closeSB()"></div>

<script>
var sb=null,sdkReady=false,currentUser=null,currentProfile=null,ownerMode=null,currentPage='dashboard';
var DEFAULT_SB_URL='https://eszdbwmazsdltngrjjkm.supabase.co',DEFAULT_SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzemRid21henNkbHRuZ3JqamttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4Mjc5MTMsImV4cCI6MjA5NTQwMzkxM30.VWZg_O4TheXudhdgUMEPoQRAjyEic95vber3FxnxTss';
var pageState={rooms:{filter:'all',search:''},tenants:{filter:'all',search:''},rent:{filter:'all',search:''},contracts:{filter:'all'}};
var cache={rooms:[],tenants:[],rents:[],settings:{enable_reminders:true,contract_remind_days:30,rent_remind_days:5,default_rent_day:1},shares:[]};
var realtimeChannel=null,reloadTimer=null;

// ========== 日期工具 ==========
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'-';var s=String(d).slice(0,10).split('-');return s[0]+'年'+parseInt(s[1],10)+'月'+parseInt(s[2],10)+'日'}
function daysDiff(a,b){return Math.ceil((new Date(b)-new Date(a))/86400000)}
function esc(s){if(s===null||s===undefined)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ========== 身份与权限 ==========
function getOwnerId(){return ownerMode==='owner'?currentUser.id:ownerMode.ownerId}
function getRole(){return ownerMode==='owner'?'owner':ownerMode.role}
function canEdit(){return getRole()==='owner'||getRole()==='editor'}

// ========== SDK 加载 ==========
function loadSDK(){return new Promise(function(resolve,reject){
if(window.supabase&&window.supabase.createClient){sdkReady=true;resolve();return}
var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
s.onload=function(){if(window.supabase&&window.supabase.createClient){sdkReady=true;resolve()}else reject(new Error('SDK加载异常'))};
s.onerror=function(){reject(new Error('SDK加载失败，请检查网络'))};
document.head.appendChild(s)})}

// ========== Toast 提示 ==========
function toast(msg,type){type=type||'s';var cls={s:'t-s',e:'t-e',w:'t-w',i:'t-i'}[type]||'t-s';var box=document.getElementById('toastBox'),el=document.createElement('div');el.className='toast '+cls;el.textContent=msg;box.appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove()},300)},2800)}

// ========== 弹窗与确认 ==========
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('overlay').classList.add('show')}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
function confirmDialog(msg,sub,onOk){openModal('<div class="cf-wrap"><div class="cf-ico">⚠️</div><div class="cf-msg">'+esc(msg)+'</div><div class="cf-sub">'+esc(sub||'')+'</div><div class="cf-btns"><button class="btn btn-gh" onclick="closeModal()" style="padding:9px 18px">取消</button><button class="btn btn-d" id="cfOk" style="padding:9px 18px">确认</button></div></div>');document.getElementById('cfOk').onclick=function(){closeModal();onOk()}}

// ========== 认证相关 ==========
async function checkAuth(){if(!sb){renderConfig();return}try{var r=await sb.auth.getSession();if(r.data&&r.data.session){currentUser=r.data.session.user;await loadProfile();await checkSharedAccess();await loadAllData();subscribeRealtime();renderApp()}else{renderAuth()}}catch(e){console.error('Auth check failed:',e);toast('连接失败，请检查网络','e');renderAuth()}}

async function loadProfile(){try{var r=await sb.from('profiles').select('*').eq('id',currentUser.id).single();if(r.error){currentProfile={name:currentUser.user_metadata?.name||''}}else{currentProfile=r.data||{name:currentUser.user_metadata?.name||''}}}catch(e){currentProfile={name:currentUser.user_metadata?.name||''}}}

async function checkSharedAccess(){try{var r=await sb.from('workspace_shares').select('*').eq('shared_with_email',currentUser.email).eq('status','accepted');if(r.data&&r.data.length>0){ownerMode={ownerId:r.data[0].owner_id,role:r.data[0].role}}else{ownerMode='owner'}}catch(e){ownerMode='owner'}}

async function doSignUp(){var email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPass').value,name=document.getElementById('authName').value.trim();if(!email||!pass){toast('请填写邮箱和密码','e');return}if(pass.length<6){toast('密码至少6位','e');return}var r=await sb.auth.signUp({email:email,password:pass,options:{data:{name:name}}});if(r.error){toast(r.error.message,'e');return}if(r.data&&r.data.session&&r.data.session.user){toast('注册成功，已自动登录');checkAuth()}else{toast('注册成功，请查收验证邮件','i');var r2=await sb.auth.signInWithPassword({email:email,password:pass});if(r2.error){toast('登录失败，请先验证邮箱','e');return}toast('登录成功');checkAuth()}}

async function doSignIn(){var email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPass').value;if(!email||!pass){toast('请填写邮箱和密码','e');return}var r=await sb.auth.signInWithPassword({email:email,password:pass});if(r.error){toast(r.error.message,'e');return}toast('登录成功');checkAuth()}

async function doSignOut(){if(realtimeChannel&&sb){sb.removeChannel(realtimeChannel);realtimeChannel=null}await sb.auth.signOut();currentUser=null;currentProfile=null;cache={rooms:[],tenants:[],rents:[],settings:{enable_reminders:true,contract_remind_days:30,rent_remind_days:5,default_rent_day:1},shares:[]};renderAuth()}

async function saveConfig(){var url=document.getElementById('cfgUrl').value.trim(),key=document.getElementById('cfgKey').value.trim(),err=document.getElementById('cfgErr'),btn=document.getElementById('cfgBtn');if(!url||!key){err.textContent='请填写完整';err.style.display='';return}if(!url.startsWith('https://')){err.textContent='URL 须以 https:// 开头';err.style.display='';return}btn.textContent='连接中...';btn.disabled=true;err.style.display='none';try{localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);if(!sdkReady)await loadSDK();sb=window.supabase.createClient(url,key);var r=await sb.from('profiles').select('id').limit(1);if(r.error&&r.error.code==='42P01'){err.textContent='数据库表不存在，请先执行 supabase-schema.sql';err.style.display='';btn.textContent='保存并连接';btn.disabled=false;return}toast('连接成功！');checkAuth()}catch(e){err.textContent='连接失败：'+(e.message||'请检查配置');err.style.display='';btn.textContent='保存并连接';btn.disabled=false}}

async function loadAllData(){var oid=getOwnerId();var results={};try{var r1=await sb.from('rooms').select('*').eq('owner_id',oid).order('created_at',{ascending:true});results.rooms=r1.data||[];if(r1.error)console.warn('rooms:',r1.error.message)}catch(e){results.rooms=[]}try{var r2=await sb.from('tenants').select('*').eq('owner_id',oid).order('created_at',{ascending:true});results.tenants=r2.data||[];if(r2.error)console.warn('tenants:',r2.error.message)}catch(e){results.tenants=[]}try{var r3=await sb.from('rents').select('*').eq('owner_id',oid).order('due_date',{ascending:false});results.rents=r3.data||[];if(r3.error)console.warn('rents:',r3.error.message)}catch(e){results.rents=[]}try{var r4=await sb.from('workspace_settings').select('*').eq('owner_id',oid).single();if(r4.error){results.settings={enable_reminders:true,contract_remind_days:30,rent_remind_days:5,default_rent_day:1}}else{results.settings=r4.data||{}}}catch(e){results.settings={enable_reminders:true,contract_remind_days:30,rent_remind_days:5,default_rent_day:1}}try{if(ownerMode==='owner'){var r5=await sb.from('workspace_shares').select('*').eq('owner_id',oid);results.shares=r5.data||[]}else{results.shares=[]}}catch(e){results.shares=[]}cache.rooms=results.rooms;cache.tenants=results.tenants;cache.rents=results.rents;cache.settings=results.settings;cache.shares=results.shares;await markOverdue()}

async function markOverdue(){var ch=false,t=today();for(var i=0;i<cache.rents.length;i++){if(cache.rents[i].status==='pending'&&cache.rents[i].due_date&&cache.rents[i].due_date<t){cache.rents[i].status='overdue';ch=true}}if(ch){try{await sb.rpc('mark_overdue_rents')}catch(e){}}}

function subscribeRealtime(){if(realtimeChannel&&sb)sb.removeChannel(realtimeChannel);var oid=getOwnerId();realtimeChannel=sb.channel('db-changes-'+oid).on('postgres_changes',{event:'*',schema:'public',table:'rooms',filter:'owner_id=eq.'+oid},function(){scheduleReload()}).on('postgres_changes',{event:'*',schema:'public',table:'tenants',filter:'owner_id=eq.'+oid},function(){scheduleReload()}).on('postgres_changes',{event:'*',schema:'public',table:'rents',filter:'owner_id=eq.'+oid},function(){scheduleReload()}).on('postgres_changes',{event:'*',schema:'public',table:'workspace_settings',filter:'owner_id=eq.'+oid},function(){scheduleReload()}).on('postgres_changes',{event:'*',schema:'public',table:'workspace_shares',filter:'owner_id=eq.'+oid},function(){scheduleReload()}).subscribe(function(st){var d=document.getElementById('rtDot'),x=document.getElementById('rtText');if(!d||!x)return;if(st==='SUBSCRIBED'){d.className='rt-dot';x.textContent='实时同步中'}else if(st==='CHANNEL_ERROR'||st==='TIMED_OUT'){d.className='rt-dot off';x.textContent='连接中断'}})}

function rDashboard(){var rooms=cache.rooms,tenants=cache.tenants.filter(function(t){return t.status==='active'}),rents=cache.rents;var occ=rooms.filter(function(r){return r.status==='occupied'}).length;var rate=rooms.length?Math.round(occ/rooms.length*100):0;var m=thisMonth();var mTotal=tenants.reduce(function(a,t){return a+(t.rent_amount||0)},0);var mPaid=rents.filter(function(r){return r.status==='paid'&&r.due_date&&String(r.due_date).slice(0,7)===m}).reduce(function(a,r){return a+r.amount},0);var mDue=rents.filter(function(r){return(r.status==='pending'||r.status==='overdue')&&r.due_date&&String(r.due_date).slice(0,7)===m}).reduce(function(a,r){return a+r.amount},0);var overdue=rents.filter(function(r){return r.status==='overdue'}).reduce(function(a,r){return a+r.amount},0);var daysWarn=cache.settings.contract_remind_days||30;var expiring=tenants.filter(function(t){return t.contract_end&&daysDiff(today(),t.contract_end)>=0&&daysDiff(today(),t.contract_end)<=daysWarn}).slice(0,5);var recentPaid=rents.filter(function(r){return r.status==='paid'}).sort(function(a,b){return(b.pay_date||'').localeCompare(a.pay_date||'')}).slice(0,5);var ce=canEdit();var expTbl=expiring.length?'<table style="margin-top:8px"><thead><tr><th>租户</th><th>房间</th><th>到期</th><th>剩余</th></tr></thead><tbody>'+expiring.map(function(t){var rm=rooms.find(function(r){return r.id===t.room_id}),d=daysDiff(today(),t.contract_end);return'<tr><td style="padding:6px;font-size:12px">'+esc(t.name)+'</td><td style="padding:6px;font-size:12px">'+esc(rm?rm.name:'-')+'</td><td style="padding:6px;font-size:12px">'+fmtDate(t.contract_end)+'</td><td style="padding:6px;font-size:12px;color:'+(d<=7?'var(--d)':d<=14?'var(--w)':'inherit')+';font-weight:600">'+d+'天</td></tr>'}).join('')+'</tbody></table>':'<p style="font-size:12px;color:var(--ts);margin-top:8px">暂无即将到期</p>';var paidTbl=recentPaid.length?'<table style="margin-top:8px"><thead><tr><th>租户</th><th>金额</th><th>收款日</th></tr></thead><tbody>'+recentPaid.map(function(r){var t=tenants.find(function(x){return x.id===r.tenant_id});return'<tr><td style="padding:6px;font-size:12px">'+esc(t?t.name:'-')+'</td><td style="padding:6px;font-size:12px;font-weight:600">¥'+r.amount.toLocaleString()+'</td><td style="padding:6px;font-size:12px">'+fmtDate(r.pay_date)+'</td></tr>'}).join('')+'</tbody></table>':'<p style="font-size:12px;color:var(--ts);margin-top:8px">暂无收款记录</p>';document.getElementById('mainContent').innerHTML='<div class="page-hd"><h2>📊 工作台</h2></div><div class="stats"><div class="sc"><div class="sc-i blue">🏘️</div><div><h3>'+rooms.length+'</h3><p>总房源</p></div></div><div class="sc"><div class="sc-i green">📈</div><div><h3>'+rate+'%</h3><p>出租率</p></div></div><div class="sc"><div class="sc-i yellow">💰</div><div><h3>¥'+mDue.toLocaleString()+'</h3><p>本月应收</p></div></div><div class="sc"><div class="sc-i red">🚨</div><div><h3>¥'+overdue.toLocaleString()+'</h3><p>逾期金额</p></div></div></div><div class="qa"><div class="qa-btn" onclick="goPage(\'rooms\');showAddRoom()"><div class="qi">🏠</div><div class="qt">添加房源</div></div><div class="qa-btn" onclick="goPage(\'tenants\');showAddTenant()"><div class="qi">👤</div><div class="qt">登记租户</div></div><div class="qa-btn" onclick="goPage(\'rent\');showAddRent()"><div class="qi">💵</div><div class="qt">记录收租</div></div><div class="qa-btn" onclick="goPage(\'rent\');generateBills()"><div class="qi">📅</div><div class="qt">生成账单</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div class="card"><div class="card-hd"><h3>⚠️ 合同预警</h3></div><div style="padding:12px 14px">'+expTbl+'</div></div><div class="card"><div class="card-hd"><h3>✅ 最近收款</h3></div><div style="padding:12px 14px">'+paidTbl+'</div></div></div>'}

vacant'?' selected':'')+'>空置</option></select></div>'+tbl+'</div>'}

async function generateBills(){if(!canEdit()){toast('只读权限','w');return}var at=cache.tenants.filter(function(t){return t.status==='active'});if(!at.length){toast('没有在住租户','w');return}var now=new Date(),y=now.getFullYear(),m=now.getMonth()+1,defaultDay=cache.settings.default_rent_day||1;var ds=y+'-'+String(m).padStart(2,'0')+'-'+String(defaultDay).padStart(2,'0'),count=0;for(var i=0;i<at.length;i++){if(cache.rents.some(function(r){return r.tenant_id===at[i].id&&r.due_date&&String(r.due_date).slice(0,7)===y+'-'+String(m).padStart(2,'0')}))continue;var r=await sb.from('rents').insert({owner_id:getOwnerId(),tenant_id:at[i].id,room_id:at[i].room_id,amount:at[i].rent_amount,due_date:ds,pay_date:null,status:ds<today()?'overdue':'pending',pay_method:'',notes:y+'年'+m+'月租金'});if(!r.error)count++}toast(count>0?'已生成'+count+'条账单':'本月账单已存在',count>0?'s':'w');await loadAllData();renderPage()}

// ========== 合同管理 ==========
function rContracts(){var st=pageState.contracts,daysWarn=cache.settings.contract_remind_days||30;var ts=cache.tenants.filter(function(t){return t.contract_end});if(st.filter==='active')ts=ts.filter(function(t){return t.status==='active'});else if(st.filter==='expired')ts=ts.filter(function(t){return t.status==='active'&&t.contract_end<today()});else if(st.filter==='expiring')ts=ts.filter(function(t){return t.status==='active'&&t.contract_end&&daysDiff(today(),t.contract_end)>=0&&daysDiff(today(),t.contract_end)<=daysWarn});ts.sort(function(a,b){return(a.contract_end||'').localeCompare(b.contract_end||'')});var ac=cache.tenants.filter(function(t){return t.status==='active'&&t.contract_end}).length;var ec=cache.tenants.filter(function(t){return t.status==='active'&&t.contract_end&&daysDiff(today(),t.contract_end)>=0&&daysDiff(today(),t.contract_end)<=30}).length;var xc=cache.tenants.filter(function(t){return t.status==='active'&&t.contract_end&&t.contract_end<today()}).length;var ce=canEdit();var tbl=ts.length?'<div class="tbl-wrap"><table><thead><tr><th>租户</th><th>房间</th><th>入住</th><th>到期</th><th>剩余</th><th>状态</th>'+(ce?'<th>操作</th>':'')+'</tr></thead><tbody>'+ts.map(function(t){var rm=cache.rooms.find(function(x){return x.id===t.room_id}),d=daysDiff(today(),t.contract_end),sg,sx;if(t.status!=='active'){sg='t-gray';sx='已退租'}else if(d<0){sg='t-red';sx='已过期'}else if(d<=7){sg='t-red';sx='7天内到期'}else if(d<=daysWarn){sg='t-yellow';sx='即将到期'}else{sg='t-green';sx='正常'}var dx=d<0?'过期'+Math.abs(d)+'天':d+'天',dc=d<0?'color:var(--d)':d<=7?'color:var(--d)':d<=14?'color:var(--w)':'';var rb=(t.status==='active'&&d<=daysWarn&&ce)?' <button class="btn btn-sm btn-o" onclick="showRenew(\''+t.id+'\')">续签</button>':'';return'<tr><td style="font-weight:600">'+esc(t.name)+'</td><td>'+esc(rm?rm.name:'-')+'</td><td>'+fmtDate(t.move_in_date)+'</td><td>'+fmtDate(t.contract_end)+'</td><td style="font-weight:600;'+dc+'">'+dx+'</td><td><span class="tag '+sg+'">'+sx+'</span></td>'+(ce?'<td><button class="btn btn-sm btn-gh" onclick="showEditTenant(\''+t.id+'\')">编辑</button>'+rb+'</td>':'')+'</tr>'}).join('')+'</tbody></table></div>':'<div class="empty"><div class="ei">📋</div><h3>暂无合同</h3></div>';document.getElementById('mainContent').innerHTML='<div class="page-hd"><h2>📋 合同管理</h2></div><div class="stats"><div class="sc"><div class="sc-i blue">📋</div><div><h3>'+ac+'</h3><p>有效合同</p></div></div><div class="sc"><div class="sc-i yellow">⏰</div><div><h3>'+ec+'</h3><p>30天内到期</p></div></div><div class="sc"><div class="sc-i red">❌</div><div><h3>'+xc+'</h3><p>已过期</p></div></div></div><div class="card"><div class="toolbar"><select class="fsel" onchange="pageState.contracts.filter=this.value;rContracts()" autocomplete="off" data-lpignore="true"><option value="all"'+(st.filter==='all'?' selected':'')+'>全部</option><option value="active"'+(st.filter==='active'?' selected':'')+'>在住</option><option value="expiring"'+(st.filter==='expiring'?' selected':'')+'>即将到期</option><option value="expired"'+(st.filter==='expired'?' selected':'')+'>已过期</option></select></div>'+tbl+'</div>'}

function showRenew(id){var t=cache.tenants.find(function(x){return x.id===id});if(!t)return;var ce2=new Date(t.contract_end),ne=new Date(ce2);ne.setFullYear(ne.getFullYear()+1);openModal('<div class="m-hd"><h3>续签 - '+esc(t.name)+'</h3><button class="m-x" onclick="closeModal()">×</button></div><div class="m-bd"><div class="dr"><div class="dl">当前到期</div><div class="dv">'+fmtDate(t.contract_end)+'</div></div><div class="fr"><div class="fg" style="margin-top:14px"><label>新到期日<span class="req">*</span></label><input class="fc" id="fNE" type="date" value="'+ne.toISOString().slice(0,10)+'"></div><div class="fg" style="margin-top:14px"><label>月租金(元)</label><input class="fc" id="fNR" type="number" value="'+(t.rent_amount||'')+'"></div></div></div><div class="m-ft"><button class="btn btn-gh" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="doRenew(\''+id+'\')">确认续签</button></div>')}
async function doRenew(id){var ne=document.getElementById('fNE').value,nr=parseFloat(document.getElementById('fNR').value);if(!ne){toast('请选新到期日','e');return}var upd={contract_end:ne};if(nr&&nr>0)upd.rent_amount=nr;var r=await sb.from('tenants').update(upd).eq('id',id);if(r.error){toast(r.error.message,'e');return}closeModal();toast('续签成功');await loadAllData();renderPage()}

// ========== 共享管理 ==========
function rSharing(){var shares=cache.shares||[];var list=shares.length?shares.map(function(s){var sg=s.status==='accepted'?'t-green':s.status==='rejected'?'t-red':'t-yellow',sx=s.status==='accepted'?'已接受':s.status==='rejected'?'已拒绝':'待接受',rt=s.role==='editor'?'可编辑':'仅查看';return'<div class="share-card"><div class="sc-info"><h4>'+esc(s.shared_with_email)+'</h4><p>角色：'+rt+' · 状态：<span class="tag '+sg+'">'+sx+'</span> · '+fmtDate(s.created_at)+'</p></div><div style="display:flex;gap:6px"><button class="btn btn-sm btn-gh" style="color:var(--d)" onclick="removeShare(\''+s.id+'\')">移除</button></div></div>'}).join(''):'<div class="empty"><div class="ei">🔗</div><h3>暂无共享</h3><p>邀请他人协作管理你的房源</p></div>';document.getElementById('mainContent').innerHTML='<div class="page-hd"><h2>🔗 共享管理</h2></div><div class="card"><div class="card-hd"><h3>邀请协作</h3></div><div style="padding:14px"><p style="font-size:12px;color:var(--ts);margin-bottom:12px">邀请家人、管家或合伙人一起管理。对方注册后即可通过邮箱接受邀请。</p><div class="invite-form"><input class="fc" id="fSE" type="email" placeholder="对方邮箱地址" autocomplete="off"><select class="fc" id="fSR" autocomplete="off" data-lpignore="true"><option value="editor">可编辑</option><option value="viewer">仅查看</option></select><button class="btn btn-p" onclick="doInvite()">发送邀请</button></div></div></div><div class="card"><div class="card-hd"><h3>已邀请列表</h3></div><div style="padding:14px">'+list+'</div></div>'}

async function doInvite(){var email=document.getElementById('fSE').value.trim(),role=document.getElementById('fSR').value;if(!email){toast('请输入邮箱','e');return}var r=await sb.from('workspace_shares').insert({owner_id:currentUser.id,shared_with_email:email,role:role,status:'pending'});if(r.error){toast(r.error.message,'e');return}toast('邀请已发送');document.getElementById('fSE').value='';await loadAllData();renderPage()}
function removeShare(id){confirmDialog('移除此共享？','对方将无法再访问',async function(){var r=await sb.from('workspace_shares').delete().eq('id',id);if(r.error){toast(r.error.message,'e');return}toast('已移除');await loadAllData();renderPage()})}

// ========== 设置页 ==========
function rSettings(){var s=cache.settings,ce=canEdit();document.getElementById('mainContent').innerHTML='<div class="page-hd"><h2>⚙️ 设置</h2></div><div class="card"><div class="card-hd"><h3>提醒设置</h3></div><div style="padding:14px"><div class="s-item"><div><h4>启用到期提醒</h4><p>工作台显示合同到期提醒</p></div><button class="tgl'+(s.enable_reminders?' on':'')+'" id="tglReminder" onclick="tglReminder()"></button></div><div class="s-item"><div><h4>合同提前提醒天数</h4></div><div style="display:flex;align-items:center;gap:6px"><input type="number" class="fc" style="width:66px;text-align:center" id="iContractDays" value="'+(s.contract_remind_days||30)+'" onchange="updSet(\'contract_remind_days\',parseInt(this.value))"'+(ce?'':' disabled')+'><span style="font-size:11px;color:var(--ts)">天</span></div></div><div class="s-item"><div><h4>租金提前提醒天数</h4></div><div style="display:flex;align-items:center;gap:6px"><input type="number" class="fc" style="width:66px;text-align:center" id="iRentDays" value="'+(s.rent_remind_days||5)+'" onchange="updSet(\'rent_remind_days\',parseInt(this.value))"'+(ce?'':' disabled')+'><span style="font-size:11px;color:var(--ts)">天</span></div></div><div class="s-item"><div><h4>默认收租日</h4></div><div style="display:flex;align-items:center;gap:6px"><input type="number" class="fc" style="width:66px;text-align:center" id="iRentDay" value="'+(s.default_rent_day||1)+'" min="1" max="28" onchange="updSet(\'default_rent_day\',parseInt(this.value))"'+(ce?'':' disabled')+'><span style="font-size:11px;color:var(--ts)">号</span></div></div></div></div><div class="card"><div class="card-hd"><h3>账号信息</h3></div><div style="padding:14px"><div class="dr"><div class="dl">邮箱</div><div class="dv">'+esc(currentUser.email)+'</div></div><div class="dr"><div class="dl">姓名</div><div class="dv">'+esc(currentProfile.name||'-')+'</div></div><div class="dr"><div class="dl">角色</div><div class="dv">'+(getRole()==='owner'?'房东':getRole()==='editor'?'协作者':'查看者')+'</div></div></div></div><div class="card"><div class="card-hd"><h3>数据统计</h3></div><div style="padding:14px"><div class="dr"><div class="dl">房源</div><div class="dv">'+cache.rooms.length+' 套</div></div><div class="dr"><div class="dl">租户</div><div class="dv">'+cache.tenants.length+' 人</div></div><div class="dr"><div class="dl">租金记录</div><div class="dv">'+cache.rents.length+' 条</div></div><div class="dr"><div class="dl">云端同步</div><div class="dv">✅ 已连接</div></div></div></div><div class="card"><div class="card-hd"><h3>数据管理</h3></div><div style="padding:14px"><div class="s-item"><div><h4>重新配置连接</h4><p>修改 Supabase URL 或 Key</p></div><button class="btn btn-o btn-sm" onclick="reConfig()">重新配置</button></div></div></div>'}

function reConfig(){confirmDialog('重新配置？','将断开当前连接',function(){if(realtimeChannel&&sb){sb.removeChannel(realtimeChannel);realtimeChannel=null}sb=null;currentUser=null;currentProfile=null;ownerMode=null;renderConfig()})}

async function tglReminder(){if(!canEdit()){toast('只读权限','w');return}var s=cache.settings;var newVal=!s.enable_reminders;var r=await sb.from('workspace_settings').upsert({owner_id:getOwnerId(),enable_reminders:newVal,contract_remind_days:s.contract_remind_days||30,rent_remind_days:s.rent_remind_days||5,default_rent_day:s.default_rent_day||1},{onConflict:'owner_id'});if(r.error){toast(r.error.message,'e');return}cache.settings.enable_reminders=newVal;var tg=document.getElementById('tglReminder');if(tg)tg.classList.toggle('on',newVal);toast('设置已更新')}

async function updSet(key,val){if(!canEdit()){toast('只读权限','w');return}var s=cache.settings;var r=await sb.from('workspace_settings').upsert({owner_id:getOwnerId(),enable_reminders:s.enable_reminders!==undefined?s.enable_reminders:true,contract_remind_days:s.contract_remind_days||30,rent_remind_days:s.rent_remind_days||5,default_rent_day:s.default_rent_day||1,[key]:val},{onConflict:'owner_id'});if(r.error){toast(r.error.message,'e');return}cache.settings[key]=val;toast('设置已更新')}

// ========== 启动 ==========
async function boot(){try{await loadSDK();var su=localStorage.getItem('sb_url')||DEFAULT_SB_URL,sk=localStorage.getItem('sb_key')||DEFAULT_SB_KEY;if(su&&sk){try{sb=window.supabase.createClient(su,sk)}catch(e){console.error('Client creation failed:',e);renderConfig();return}}await checkAuth()}catch(e){console.error('Boot error:',e);document.getElementById('app').innerHTML='<div class="auth-page"><div class="auth-card"><div class="logo">❌</div><h1>加载失败</h1><p class="sub">'+esc(e.message||'未知错误')+'</p><button class="btn btn-p btn-block" onclick="boot()">重试</button></div></div>'}}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot)}else{boot()}
</script>
